<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/styles/theme.css" />
    <link rel="stylesheet" href="./src/styles/text.css" />
    <link rel="stylesheet" href="./src/styles/common.css" />
    <link rel="stylesheet" href="./src/styles/modal.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div id="app">
      <header class="header">
        <h1 class="text-lotto-title">🎱 행운의 로또</h1>
      </header>

      <main class="app-container">
        <section class="lotto-container">
          <h2 class="text-lotto-title lotto-container-title">
            🎱 내 번호 당첨 확인 🎱
          </h2>
          <section class="money-container">
            <form class="money-form">
              <label for="money-input" class="text-lotto-body"
                >구입할 금액을 입력해주세요.</label
              >
              <div class="money-input-wrapper">
                <input
                  id="money-input"
                  class="money-input"
                  type="number"
                  placeholder="금액"
                  required
                />
                <button class="money-input-button text-lotto-caption">
                  구입
                </button>
              </div>
            </form>
          </section>
          <section class="lotto-number-container"></section>
          <section class="winning-bonus-container hidden">
            <h2 class="text-lotto-body">
              지난 주 당첨 번호 6개와 보너스 번호 1개를 입력해 주세요.
            </h2>
            <form class="winning-numbers-form">
              <section class="number-group">
                <fieldset class="winning-numbers-group">
                  <legend class="text-lotto-body">당첨 번호</legend>
                  <div class="winning-numbers-inputs">
                    <input
                      type="number"
                      id="winning-number-1"
                      class="winning-number-input"
                      aria-label="첫 번째 당첨 번호"
                    />
                    <input
                      type="number"
                      id="winning-number-2"
                      class="winning-number-input"
                      aria-label="두 번째 당첨 번호"
                    />
                    <input
                      type="number"
                      id="winning-number-3"
                      class="winning-number-input"
                      aria-label="세 번째 당첨 번호"
                    />
                    <input
                      type="number"
                      id="winning-number-4"
                      class="winning-number-input"
                      aria-label="네 번째 당첨 번호"
                    />
                    <input
                      type="number"
                      id="winning-number-5"
                      class="winning-number-input"
                      aria-label="다섯 번째 당첨 번호"
                    />
                    <input
                      type="number"
                      id="winning-number-6"
                      class="winning-number-input"
                      aria-label="여섯 번째 당첨 번호"
                    />
                  </div>
                </fieldset>

                <div class="bonus-number-group">
                  <label for="bonus-number" class="text-lotto-body"
                    >보너스 번호</label
                  >
                  <input
                    type="number"
                    id="bonus-number"
                    class="bonus-number-input"
                  />
                </div>
              </section>

              <button type="submit" class="lotto-button text-lotto-caption">
                결과 확인하기
              </button>
            </form>
          </section>
        </section>
      </main>

      <footer class="footer">
        <p class="text-lotto-caption">Copyright 2023. woowacourse</p>
      </footer>
    </div>
    <div class="result-modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="close-button-area">
          <button class="modal-close-button" type="button"></button>
        </div>

        <h2 class="text-lotto-subtitle">🏆 당첨 통계 🏆</h2>

        <table class="result-table">
          <thead>
            <tr>
              <th>일치 갯수</th>
              <th>당첨금</th>
              <th>당첨 갯수</th>
            </tr>
          </thead>
          <tbody class="result-table-body"></tbody>
        </table>

        <p class="text-lotto-body total-profit-rate">
          당신의 총 수익률은 0%입니다.
        </p>

        <button class="lotto-button reset-button" type="button">
          다시 시작하기
        </button>
      </div>
    </div>

    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>

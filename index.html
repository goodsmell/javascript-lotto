<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/styles/theme.css" />
    <link rel="stylesheet" href="./src/styles/text.css" />
    <link rel="stylesheet" href="./src/styles/common.css" />
    <link rel="stylesheet" href="./src/styles/modal.css" />
  </head>

  <body>
    <div id="app">
      <header id="header" class="header">
        <h1 class="lotto-title">🎱 행운의 로또</h1>
      </header>

      <main id="lotto" class="app-container">
        <section class="lotto-container">
          <h1 class="lotto-title">🎱 내 번호 당첨 확인 🎱</h1>
          <section id="money-container">
            <p class="lotto-body">구입할 금액을 입력해주세요.</p>
            <form id="money-form">
              <input id="money-input" placeholder="금액" />
              <button id="money-input-button" class="lotto-caption">
                구입
              </button>
            </form>
          </section>
          <section id="lotto-number-container"></section>
          <section id="winning-bonus-container" class="hidden">
            <h2 class="lotto-body">
              지난 주 당첨 번호 6개와 보너스 번호 1개를 입력해 주세요.
            </h2>
            <form id="winning-numbers-form">
              <div class="winning-numbers-group">
                <label>당첨 번호</label>
                <div class="winning-numbers-inputs">
                  <input type="number" class="winning-number-input" />
                  <input type="number" class="winning-number-input" />
                  <input type="number" class="winning-number-input" />
                  <input type="number" class="winning-number-input" />
                  <input type="number" class="winning-number-input" />
                  <input type="number" class="winning-number-input" />
                </div>
              </div>

              <div class="bonus-number-group">
                <label>보너스 번호</label>
                <input type="number" id="bonus-number-input" />
              </div>

              <button type="submit" id="result-button" class="lotto-button">
                결과 확인하기
              </button>
            </form>
          </section>
        </section>
      </main>

      <footer id="footer" class="footer">
        <p class="lotto-caption">Copyright 2023. woowacourse</p>
      </footer>
    </div>
    <div id="result-modal" class="result-modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <button id="modal-close-button">X</button>
        <h1>🏆 당첨 통계 🏆</h1>

        <table class="result-table">
          <thead>
            <tr>
              <th>일치 갯수</th>
              <th>당첨금</th>
              <th>당첨 횟수</th>
            </tr>
          </thead>
          <tbody id="result-table-body"></tbody>
        </table>
        <p id="total-profit-rate" class="lotto-body">
          당신의 총 수익률은 0%입니다.
        </p>

        <button id="reset-button" class="lotto-button">다시 시작하기</button>
      </div>
    </div>

    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
